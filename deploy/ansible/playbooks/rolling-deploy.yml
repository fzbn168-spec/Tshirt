- name: Rolling deploy
  hosts: web
  gather_facts: false
  serial: 1
  vars_files:
    - ../vars/production.yml
  tasks:
    - name: Deploy compose on host (rolling)
      include_role:
        name: compose-deploy
      vars:
        compose_file: "{{ compose_file }}"

    - name: Run healthcheck on host
      include_role:
        name: healthcheck
      vars:
        check_url: "http://localhost:3001/health"
